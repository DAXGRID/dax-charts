image:
  repository: openftth/mbtileserver
  tag: v0.11.0

watcher:
  image: openftth/tile-watcher
  tag: v3.5.0
  enabled: false
  notificationServer:
    domain: notification-server
    port: 80
  fileServer:
    username: ""
    password: ""
    uri: ""
  tileProcess:
    destination: /data
    processes:
      - name: ""
        value: ""
  startupProbe:
    failureThreshold: 100

directDownload:
  image: daxgrid/file-server-direct-download
  tag: v0.2.0
  enabled: false
  dest: "/data"
  fileName: ""
  username: ""
  password: ""
  uri: ""

service:
  externalPort: 80
  type: ClusterIP

commandArgs:
  - "--enable-reload-signal"
  - "--disable-preview"
  - "--disable-svc-list"
  - "--disable-tilejson"
  - "-d"
  - "/data"
