username: postgres
password: postgres

serviceType: ClusterIP

image:
  repository: openftth/postgis
  tag: 18.4-3.6.3

volumeClaim:
  storageClassName: ""
  storage: 10Gi

resources:
  requests:
    memory: 1Gi

serviceAnnotations: {}

maxConnections: 100
sharedBuffers: "128MB"
effectiveCacheSize: "4096MB"
effectiveIoConcurrency: 10
seqPageCost: 1.0
randomPageCost: 4.0
cpuTupleCost: 0.01
maxWalSize: "1028MB"
walLevel: "replica"
maxWalSenders: 10

sslEnabled: false
rootCertificate: ""
serverCertificate: ""
serverKey: ""
postgresDatabaseName: "OPEN_FTTH"

